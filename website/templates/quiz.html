  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function buildQuiz(questions) {
    var container = document.getElementById('quiz-questions');
    container.innerHTML = '';
    questions.forEach(function (q, idx) {
      var num = idx + 1;
      var numStr = num < 10 ? '0' + num : '' + num;
      var html = '<div class="quiz-card" id="q' + num + '">';
      html += '<div class="quiz-num">' + numStr + '</div>';
      html += '<div class="quiz-question">' + q.q + '</div>';
      html += '<div class="quiz-options">';
      ['a', 'b', 'c', 'd'].forEach(function (letter) {
        html += '<label class="quiz-option"><input type="radio" name="q' + num + '" value="' + letter + '"> <span>' + q.opts[letter] + '</span></label>';
      });
      html += '</div>';
      html += '<div class="quiz-feedback" data-correct="' + q.ans + '" data-explanation="' + q.exp.replace(/"/g, '&quot;') + '"></div>';
      html += '</div>';
      container.innerHTML += html;
    });
  }

  var current = shuffle(BANK).slice(0, 30);
  buildQuiz(current);

  var LABELS = [
    'Beginner \u2014 keep reading the encyclopedia!',
    'Amateur \u2014 solid foundation, keep studying.',
    'Contender \u2014 you know your boxing.',
    'Champion \u2014 outstanding boxing knowledge!',
    'Perfect \u2014 you\'ve mastered the encyclopedia!'
  ];

  document.getElementById('quiz-submit').addEventListener('click', function () {
    var score = 0;
    var unanswered = [];

    for (var i = 1; i <= 30; i++) {
      var qid = 'q' + i;
      var sel = document.querySelector('input[name="' + qid + '"]:checked');
      var card = document.getElementById(qid);
      var fb = card.querySelector('.quiz-feedback');
      var correct = fb.getAttribute('data-correct');
      var explanation = fb.getAttribute('data-explanation');

      card.classList.remove('quiz-correct', 'quiz-wrong');
      card.querySelectorAll('.quiz-option').forEach(function (opt) {
        opt.classList.remove('quiz-opt-correct', 'quiz-opt-wrong', 'quiz-opt-chosen');
      });

      if (!sel) { unanswered.push(qid); continue; }

      var chosen = sel.value;
      card.querySelectorAll('.quiz-option').forEach(function (opt) {
        var val = opt.querySelector('input').value;
        if (val === correct) opt.classList.add('quiz-opt-correct');
        if (val === chosen && chosen !== correct) opt.classList.add('quiz-opt-wrong');
        if (val === chosen) opt.classList.add('quiz-opt-chosen');
      });

      if (chosen === correct) { score++; card.classList.add('quiz-correct'); }
      else { card.classList.add('quiz-wrong'); }

      fb.innerHTML = '<span class="quiz-fb-icon">' + (chosen === correct ? '&#10003;' : '&#10007;') + '</span> ' + explanation;
      fb.style.display = 'block';
      card.querySelectorAll('input[type="radio"]').forEach(function (r) { r.disabled = true; });
    }

    if (unanswered.length > 0) {
      unanswered.forEach(function (q) { document.getElementById(q).classList.add('quiz-unanswered'); });
      return;
    }

    document.getElementById('quiz-score-num').textContent = score;
    var labelIdx = score <= 6 ? 0 : score <= 14 ? 1 : score <= 22 ? 2 : score <= 29 ? 3 : 4;
    document.getElementById('quiz-score-label').textContent = LABELS[labelIdx];
    document.getElementById('quiz-results').style.display = 'block';
    document.getElementById('quiz-submit').style.display = 'none';
    document.getElementById('quiz-results').scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  document.getElementById('quiz-retry').addEventListener('click', function () {
    current = shuffle(BANK).slice(0, 30);
    buildQuiz(current);
    document.getElementById('quiz-results').style.display = 'none';
    document.getElementById('quiz-submit').style.display = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

}());
</script>
